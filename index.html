
<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Jumping Game</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <!-- Start Screen -->
        <section id="startScreen" aria-label="Start screen">
            <h1>Jumping Game</h1>
            <button id="startBtn">Start Game</button>
        </section>
        <!-- Game Over Screen -->
        <section id="gameOverScreen" aria-label="Game over screen">
        
            <h1>Game Over</h1>
            <h2>Your Score: <span id="finalScore">0</span></h2>
            <button id="playAgainBtn">Play Again</button>
        
        </section>

        <!-- Game Container -->
        <main class="game-container">

            <header>
                <h1>Jumping Game</h1>
            </header>

            <section class="top-bar" aria-label="Scoreboard">

                <p class="score-board">
                    Score: <span id="score">0</span>
                </p>
                <p class="high-score">
                    High Score: <span id="highScore">0</span>
                </p>

            </section>

            <section id="game" aria-label="Game area">
                <div id="character"></div>
            </section>

            <p class="controls">
                ENTER = Start | SPACE = Jump | P = Pause | R = Restart
            </p>

            <footer>
                <button id="pauseBtn">Pause</button>
                <button id="restartBtn">Restart</button>
            </footer>

        </main>

        <!-- Sounds -->
        <audio id="jumpSound" src="./sounds/jump.wav"></audio>
        <audio id="gameOverSound" src="./sounds/gameover.wav"></audio>
        <audio id="bgMusic" src="./sounds/background.wav" loop></audio>

        <script src="script.js"></script>
    </body>

</html>
